<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 17</title>
</head>
<body>

    <h1>Ejercicio 17 - Contar letra A</h1>

    <script>
        const contarLetraA = (texto) => {
            let contador = 0;

            for (let i = 0; i < texto.length; i++) {
                if (texto[i].toLowerCase() === "a") {
                    contador = contador + 1;
                }
            }

            return contador;
        };

        const textoIngresado = prompt("Ingrese una palabra o frase:");

        const cantidad = contarLetraA(textoIngresado);

        document.write(`<p>Texto ingresado: ${textoIngresado}</p>`);
        document.write(`<p>La letra "a" aparece ${cantidad} veces.</p>`);
    </script>

</body>
</html>
