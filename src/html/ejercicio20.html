<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/ejercicio20.css">
    <title>Ejercicio 20</title>
</head>
<body>
    <main>
        <h1>Ingrese Datos:</h1>
        <div>
            <form id="form-carga">
                <div>
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" placeholder="Ingrese Nombre" required>
                </div>
                <div>
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" placeholder="Ingrese Apellido" required>
                </div>
                <div>
                    <label for="lu">Libreta Universitaria:</label>
                    <input type="number" id="lu" placeholder="Ingrese Libreta Universitaria" required>
                </div>  
                <button type="submit" id="btn-procesar">Registrar Estudiante</button>        
            </form>
        </div> 
        <section id="resultado"></section>
    </main>
    
    <script type="module" src="../js/ejercicio20.js"></script>
</body>
</html>
