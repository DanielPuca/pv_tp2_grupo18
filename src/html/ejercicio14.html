<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14</title>
</head>
<body>
    <script>
        const duplicar = (numeros) => {

            let duplicados = [];
            for(let i = 0; i < numeros.length; i++) {
                duplicados.push(numeros[i] * 2);
            }
            return duplicados;
        };

        let cantidad = prompt("Cuantos numeros desea ingresar? ");

        let numeros = [];

        for(let i = 0; i < cantidad; i++) {
            let numero = prompt("Ingrese un numero: ");
            numeros.push(numero);
        }

        duplicar(numeros);

        console.log('Numeros ingresados: ' + numeros);
        console.log('Numeros duplicados: ' + duplicar(numeros));

    </script>
</body>
</html>
